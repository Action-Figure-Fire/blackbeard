<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrokerBeacon — Ticket Intelligence</title>
<meta name="description" content="AI-powered ticket intelligence for brokers.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a25;
  --surface3: #222233;
  --border: #2a2a3a;
  --border-light: #3a3a4a;
  --accent: #818cf8;
  --accent-dim: #6366f1;
  --accent-glow: rgba(129,140,248,0.12);
  --text: #f0f0f5;
  --text-dim: #8888a0;
  --text-muted: #5a5a70;
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.15);
  --red: #fb7185;
  --red-dim: rgba(251,113,133,0.15);
  --yellow: #fbbf24;
  --yellow-dim: rgba(251,191,36,0.15);
  --orange: #fb923c;
  --cyan: #22d3ee;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
}
.header .logo {
  font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header .badge {
  font-size: 9px; background: var(--accent-glow); color: var(--accent);
  padding: 3px 8px; border-radius: 4px; font-weight: 700; letter-spacing: 1px;
}
.header .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.header .status { font-size: 10px; color: var(--text-dim); display: flex; align-items: center; gap: 5px; }
.header .status-dot {
  width: 5px; height: 5px; background: var(--green); border-radius: 50%;
  box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite;
}
.header .settings-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
  transition: all 0.2s;
}
.header .settings-btn:hover { border-color: var(--accent); color: var(--text); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Chat Area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 8px;
  max-width: 960px; width: 100%; margin: 0 auto;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Messages */
.message {
  max-width: 92%; padding: 14px 18px; border-radius: 12px;
  font-size: 13.5px; line-height: 1.65; word-wrap: break-word;
}
.message.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--accent-dim) 0%, #4338ca 100%);
  color: #fff; border-bottom-right-radius: 4px; font-weight: 500;
}
.message.assistant {
  align-self: flex-start; background: var(--surface);
  border: 1px solid var(--border); border-bottom-left-radius: 4px;
}

/* Typography in messages */
.message.assistant strong { color: #fff; font-weight: 600; }
.message.assistant em { color: var(--yellow); font-style: normal; }
.message.assistant code {
  background: var(--surface3); padding: 2px 6px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--cyan);
}
.message.assistant h1 { color: #fff; margin: 18px 0 10px 0; font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
.message.assistant h2 {
  color: var(--accent); margin: 16px 0 8px 0; font-size: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}
.message.assistant h3 {
  color: var(--text-dim); margin: 12px 0 5px 0; font-size: 11.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.8px;
}

/* Tables — compact, color-coded */
.message.assistant table {
  border-collapse: separate; border-spacing: 0;
  width: 100%; margin: 6px 0 10px 0; font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border);
}
.message.assistant th {
  background: var(--surface3); color: var(--accent); font-weight: 600;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border);
}
.message.assistant td {
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.message.assistant tr:last-child td { border-bottom: none; }
.message.assistant tr:hover td { background: var(--accent-glow); }

/* Lists */
.message.assistant ul, .message.assistant ol { padding-left: 18px; margin: 4px 0; }
.message.assistant li { margin: 2px 0; }
.message.assistant li::marker { color: var(--accent); }
.message.assistant hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* Price color classes (applied by post-processor) */
.price-hot { color: var(--red); font-weight: 600; }
.price-warm { color: var(--orange); font-weight: 600; }
.price-mid { color: var(--yellow); font-weight: 600; }
.price-low { color: var(--green); font-weight: 500; }
.price-cold { color: var(--text-dim); }
.tag-buy { display: inline-block; background: var(--red-dim); color: var(--red); padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 700; }
.tag-watch { display: inline-block; background: var(--yellow-dim); color: var(--yellow); padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 700; }
.tag-pass { display: inline-block; background: rgba(100,100,120,0.2); color: var(--text-dim); padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 700; }

/* Artist name colors — rotating palette */
.artist-name { font-weight: 700; padding: 0 2px; }
.artist-c0 { color: #818cf8; } /* indigo */
.artist-c1 { color: #34d399; } /* emerald */
.artist-c2 { color: #f472b6; } /* pink */
.artist-c3 { color: #fb923c; } /* orange */
.artist-c4 { color: #22d3ee; } /* cyan */
.artist-c5 { color: #a78bfa; } /* violet */
.artist-c6 { color: #fbbf24; } /* amber */
.artist-c7 { color: #4ade80; } /* green */
.artist-c8 { color: #f87171; } /* red */
.artist-c9 { color: #38bdf8; } /* sky */
.artist-c10 { color: #e879f9; } /* fuchsia */
.artist-c11 { color: #2dd4bf; } /* teal */
.listings-hot { color: var(--red); }
.listings-thin { color: var(--text-muted); font-style: italic; }

/* Tool log */
.tool-log {
  font-size: 10px; color: var(--text-muted); padding: 4px 10px;
  background: transparent; border-radius: 4px; margin-bottom: 1px;
  border-left: 2px solid var(--border);
  font-family: 'JetBrains Mono', monospace; align-self: flex-start; max-width: 90%;
}

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; gap: 16px; text-align: center; padding: 40px 20px;
}
.welcome .icon { font-size: 40px; }
.welcome h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.welcome h2 span {
  background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.welcome p { color: var(--text-dim); max-width: 440px; line-height: 1.6; font-size: 14px; }
.welcome .examples {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 6px; max-width: 580px;
}
.welcome .example-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;
  transition: all 0.2s; font-family: 'Inter', sans-serif;
}
.welcome .example-btn:hover { border-color: var(--accent); color: var(--text); background: var(--accent-glow); }

/* Loading */
.loading { display: flex; gap: 5px; padding: 14px 18px; align-self: flex-start; }
.loading .dot {
  width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out;
}
.loading .dot:nth-child(2) { animation-delay: 0.16s; }
.loading .dot:nth-child(3) { animation-delay: 0.32s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

/* Input */
.input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); }
.input-wrapper { display: flex; gap: 8px; max-width: 960px; margin: 0 auto; }
.input-wrapper textarea {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); padding: 11px 14px; font-size: 13.5px; font-family: 'Inter', sans-serif;
  resize: none; outline: none; min-height: 44px; max-height: 150px; transition: border-color 0.2s;
}
.input-wrapper textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
.input-wrapper textarea::placeholder { color: var(--text-muted); }
.send-btn {
  background: linear-gradient(135deg, var(--accent-dim) 0%, #4338ca 100%);
  border: none; border-radius: 10px; width: 44px; height: 44px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; align-self: flex-end;
}
.send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.send-btn svg { width: 16px; height: 16px; fill: #fff; }

.footer {
  text-align: center; font-size: 9px; color: var(--text-muted); padding: 5px;
  letter-spacing: 0.5px; font-weight: 500;
}

.config-banner {
  background: var(--surface2); border-bottom: 1px solid var(--border);
  padding: 8px 20px; font-size: 11px; color: var(--yellow); display: none; text-align: center;
}
.config-banner a { color: var(--accent); cursor: pointer; text-decoration: underline; }

/* Responsive */
@media (max-width: 640px) {
  .chat-area { padding: 12px; }
  .message { max-width: 96%; padding: 10px 14px; font-size: 13px; }
  .message.assistant table { font-size: 11px; }
  .message.assistant td, .message.assistant th { padding: 4px 6px; }
  .welcome h2 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="config-banner" id="configBanner">
  ⚠️ Backend not connected. <a onclick="showConfig()">Configure API endpoint</a>
</div>

<div class="header">
  <div class="logo">BrokerBeacon</div>
  <div class="badge">INTELLIGENCE</div>
  <div class="right">
    <div class="status"><span class="status-dot"></span> Live</div>
    <button class="settings-btn" onclick="showConfig()">⚙️</button>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">🎯</div>
    <h2>Ask <span>anything</span> about tickets</h2>
    <p>Real-time secondary market pricing, sellout analysis, and buy/pass/watch verdicts — powered by live data.</p>
    <div class="examples">
      <button class="example-btn" onclick="sendExample(this)">📊 Who has presales this week?</button>
      <button class="example-btn" onclick="sendExample(this)">Feid</button>
      <button class="example-btn" onclick="sendExample(this)">Deep dive on RAYE</button>
      <button class="example-btn" onclick="sendExample(this)">Show me the VIP watchlist</button>
      <button class="example-btn" onclick="sendExample(this)">Compare Don West to RAYE</button>
      <button class="example-btn" onclick="sendExample(this)">UK breakouts with first US tours</button>
      <button class="example-btn" onclick="sendExample(this)">Best LATAM theater plays right now</button>
      <button class="example-btn" onclick="sendExample(this)">🎤 Hot comedians under 3K cap</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="userInput" placeholder="Ask about any artist, tour, or event..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<div class="footer">BROKERBEACON.IO — TICKET INTELLIGENCE</div>

<script>
const DEFAULT_API_URL = 'https://blackbeard-api.brokerbeacon.workers.dev';
const API_URL = localStorage.getItem('bb_api_url') || DEFAULT_API_URL;
let conversationHistory = [];
let isLoading = false;

function showConfig() {
  const url = prompt('BrokerBeacon API URL:', localStorage.getItem('bb_api_url') || DEFAULT_API_URL);
  if (url) {
    localStorage.setItem('bb_api_url', url.trim());
    const secret = prompt('API secret:', localStorage.getItem('bb_api_secret') || '');
    if (secret !== null) localStorage.setItem('bb_api_secret', secret.trim());
    location.reload();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function sendExample(btn) {
  document.getElementById('userInput').value = btn.textContent;
  sendMessage();
}

function renderMarkdown(text) {
  let html = text
    .replace(/^#### (.*$)/gm, '<h3>$1</h3>')
    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^\|(.+)\|$/gm, (match) => {
      const cells = match.split('|').filter(c => c.trim());
      if (cells.every(c => /^[\s\-:]+$/.test(c))) return '';
      return '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
    })
    .replace(/((<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>')
    .replace(/^- (.*$)/gm, '<li>$1</li>')
    .replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');

  // Post-process: color-code prices in table cells
  html = html.replace(/<td>(\$\d[\d,]*)<\/td>/g, (match, price) => {
    const num = parseInt(price.replace(/[$,]/g, ''));
    if (num >= 300) return `<td><span class="price-hot">${price}</span></td>`;
    if (num >= 200) return `<td><span class="price-warm">${price}</span></td>`;
    if (num >= 100) return `<td><span class="price-mid">${price}</span></td>`;
    if (num >= 50) return `<td><span class="price-low">${price}</span></td>`;
    return `<td><span class="price-cold">${price}</span></td>`;
  });

  // Color-code verdict emojis
  html = html.replace(/🔴\s*(BUY|STRONG BUY|ELEVATED DEMAND)/gi, '<span class="tag-buy">🔴 $1</span>');
  html = html.replace(/🟡\s*(WATCH|MONITOR)/gi, '<span class="tag-watch">🟡 $1</span>');
  html = html.replace(/⚪\s*(PASS|INSUFFICIENT SIGNAL)/gi, '<span class="tag-pass">⚪ $1</span>');

  // Artist name colorization — detect bold artist names and assign rotating colors
  const artistColorMap = {};
  let colorIdx = 0;
  html = html.replace(/<strong>([^<]{2,40})<\/strong>/g, (match, name) => {
    // Skip non-artist strings (numbers, short words, common terms)
    if (/^\$|^\d|^(Date|Venue|City|Get-In|Listings|Capacity|Total|Average|Price|Risk|Note|Pattern|Key|Source|Verdict|Summary|Analysis|Bull|Bear|Tier|Genre|Tour|Album|Label)$/i.test(name.trim())) {
      return match;
    }
    // Skip if it's all caps (likely a header/label)
    if (name === name.toUpperCase() && name.length > 4) return match;
    // Assign color to unique artist names
    const key = name.toLowerCase().trim();
    if (!(key in artistColorMap)) {
      artistColorMap[key] = colorIdx % 12;
      colorIdx++;
    }
    return `<strong class="artist-name artist-c${artistColorMap[key]}">${name}</strong>`;
  });

  // First row of table becomes header
  html = html.replace(/<table><tr>(.*?)<\/tr>/g, (match, row) => {
    const headerRow = row.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>');
    return `<table><tr>${headerRow}</tr>`;
  });

  return html;
}

function addMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'message ' + role;
  if (role === 'assistant') {
    div.innerHTML = renderMarkdown(content);
  } else {
    div.textContent = content;
  }
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function addToolLog(logs) {
  if (!logs || logs.length === 0) return;
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'tool-log';
  div.textContent = '⚡ ' + logs.map(l => l.replace('🔍 ', '')).join('  →  ');
  chatArea.appendChild(div);
}

const LOADING_MESSAGES = [
  '🔍 Searching knowledge base...',
  '📊 Pulling secondary market data...',
  '🎵 Checking streaming numbers...',
  '🗓️ Loading tour dates...',
  '🧠 Analyzing patterns...',
  '📈 Comparing to reference cases...',
  '✍️ Writing analysis...'
];
let loadingInterval = null;
let loadingStep = 0;

function showLoading() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'tool-log'; div.id = 'loadingIndicator';
  div.textContent = LOADING_MESSAGES[0];
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  loadingStep = 0;
  loadingInterval = setInterval(() => {
    loadingStep++;
    if (loadingStep < LOADING_MESSAGES.length) {
      div.textContent = LOADING_MESSAGES[loadingStep];
      chatArea.scrollTop = chatArea.scrollHeight;
    }
  }, 2500);
}

function hideLoading() {
  if (loadingInterval) { clearInterval(loadingInterval); loadingInterval = null; }
  const el = document.getElementById('loadingIndicator');
  if (el) el.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const apiUrl = localStorage.getItem('bb_api_url') || DEFAULT_API_URL;
  if (!apiUrl) { showConfig(); return; }

  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showLoading();

  try {
    const secret = localStorage.getItem('bb_api_secret') || '';
    const resp = await fetch(apiUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(secret ? { 'Authorization': `Bearer ${secret}` } : {})
      },
      body: JSON.stringify({ message: text, history: conversationHistory })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    hideLoading();
    addToolLog(data.toolLog);
    addMessage('assistant', data.response);
    conversationHistory.push({ role: 'user', content: text });
    conversationHistory.push({ role: 'assistant', content: data.response });
    if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);

  } catch (e) {
    hideLoading();
    addMessage('assistant', `⚠️ ${e.message}`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

window.addEventListener('load', () => {
  if (!localStorage.getItem('bb_api_url') && !DEFAULT_API_URL) {
    document.getElementById('configBanner').style.display = 'block';
  }
});
</script>
</body>
</html>
