<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackbeard — Ticket Intelligence</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a25;
  --border: #2a2a3a;
  --gold: #d4a843;
  --gold-dim: #a07830;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --blue: #60a5fa;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

/* Header */
.header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
}
.header .logo { font-size: 24px; }
.header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
}
.header .subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-left: auto;
  font-weight: 500;
}
.header .status-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Chat Area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Messages */
.message {
  max-width: 85%;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.message.user {
  align-self: flex-end;
  background: var(--gold-dim);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant {
  align-self: flex-start;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message.assistant .tier-red { color: var(--red); font-weight: 700; }
.message.assistant .tier-yellow { color: var(--yellow); font-weight: 700; }
.message.assistant .tier-green { color: var(--green); font-weight: 700; }

/* Markdown-ish rendering */
.message.assistant strong { color: var(--gold); font-weight: 600; }
.message.assistant code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
.message.assistant h2, .message.assistant h3 {
  color: var(--gold);
  margin: 12px 0 6px 0;
}

/* Welcome */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  text-align: center;
  padding: 40px;
}
.welcome .icon { font-size: 64px; }
.welcome h2 {
  font-size: 24px;
  color: var(--gold);
  font-weight: 700;
}
.welcome p {
  color: var(--text-dim);
  max-width: 500px;
  line-height: 1.6;
}
.welcome .examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
}
.welcome .example-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.welcome .example-btn:hover {
  border-color: var(--gold);
  background: var(--surface);
}

/* Loading */
.loading {
  display: flex;
  gap: 6px;
  padding: 14px 18px;
  align-self: flex-start;
}
.loading .dot {
  width: 8px; height: 8px;
  background: var(--gold-dim);
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out;
}
.loading .dot:nth-child(2) { animation-delay: 0.16s; }
.loading .dot:nth-child(3) { animation-delay: 0.32s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* Input Area */
.input-area {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.input-wrapper {
  display: flex;
  gap: 12px;
  max-width: 900px;
  margin: 0 auto;
}
.input-wrapper textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  padding: 12px 16px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 150px;
  transition: border-color 0.2s;
}
.input-wrapper textarea:focus { border-color: var(--gold); }
.input-wrapper textarea::placeholder { color: var(--text-dim); }
.send-btn {
  background: var(--gold);
  border: none;
  border-radius: 12px;
  width: 48px;
  height: 48px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  align-self: flex-end;
}
.send-btn:hover { background: var(--gold-dim); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.send-btn svg { width: 20px; height: 20px; fill: var(--bg); }

/* Settings Modal */
.settings-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.settings-btn:hover { border-color: var(--gold); color: var(--gold); }
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 480px;
}
.modal h3 { color: var(--gold); margin-bottom: 16px; font-size: 16px; }
.modal label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
  margin-top: 12px;
}
.modal input, .modal select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none;
}
.modal input:focus, .modal select:focus { border-color: var(--gold); }
.modal .btn-row { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.modal .btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
.modal .btn-save { background: var(--gold); color: var(--bg); }
.modal .btn-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.powered {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  padding: 8px;
  opacity: 0.5;
}
</style>
</head>
<body>

<div class="header">
  <span class="logo">🏴‍☠️</span>
  <h1>BLACKBEARD</h1>
  <div class="subtitle">
    <span class="status-dot"></span>
    Ticket Intelligence Terminal
  </div>
  <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">🏴‍☠️</div>
    <h2>Blackbeard Intelligence</h2>
    <p>Ask about any artist, tour, or event. Get real-time secondary market pricing, sellout analysis, and buy/pass/watch recommendations.</p>
    <div class="examples">
      <button class="example-btn" onclick="sendExample(this)">Run the Feid tour</button>
      <button class="example-btn" onclick="sendExample(this)">What's hot this week under 3K cap?</button>
      <button class="example-btn" onclick="sendExample(this)">Deep dive on Angine de Poitrine</button>
      <button class="example-btn" onclick="sendExample(this)">Best LATAM acts touring theaters right now</button>
      <button class="example-btn" onclick="sendExample(this)">UK breakout artists with first US tours</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="userInput" placeholder="Ask about any artist, tour, or event..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<div class="powered">Powered by Blackbeard Intelligence Engine · v1.0</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>⚙ Settings</h3>
    <label>Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />
    <label>Model</label>
    <select id="modelSelect">
      <option value="claude-sonnet-4-20250514">Claude Sonnet (fast, cheap)</option>
      <option value="claude-opus-4-20250514">Claude Opus (best)</option>
    </select>
    <label>Brave Search API Key (optional)</label>
    <input type="password" id="braveKey" placeholder="BSA..." />
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// BLACKBEARD INTELLIGENCE TERMINAL
// ============================================================

const SYSTEM_PROMPT = `You are Blackbeard, an AI ticket intelligence terminal for ticket brokers. You provide real-time secondary market analysis, buy/pass/watch recommendations, and artist deep dives.

## YOUR CAPABILITIES
You have access to tools that let you:
1. Pull real-time pricing from Vivid Seats internal API (get-in price, listing count, ticket count, venue capacity)
2. Search the web via Brave Search for sellout history, tour announcements, streaming data
3. Look up artist tour dates via Bandsintown API

## ANALYSIS RULES
- Under 10 listings = ⚠️ THIN (not actionable, could be scalper noise)
- Uniform pricing across 4+ dates with identical listing counts = speculative broker inventory, not real demand
- Listener-to-venue ratio: Spotify monthly listeners ÷ venue capacity. Higher = more scarcity = better buy
- GET-IN price only. Ignore averages.
- DC is a premium market (40-80% above SF/ATL for same artists)
- Haitian diaspora corridor: Miami→Brooklyn→DC→Montreal = 3-5x non-diaspora
- LATAM diaspora corridor: Miami→NYC→DC→Boston = premium pricing
- UK/International breakout → first US headline tour = HIGHEST signal buy indicator
- Support act for megastar + own headline tour = spike signal
- Citi presale code is ALWAYS 412800

## SCORING TIERS
- 🔴 BUY — Strong scarcity signal, confirmed demand, actionable now
- 🟡 WATCH — Interesting fundamentals, needs confirmation (post-onsale data, more listings)
- ⚪ PASS — No scarcity signal, face value territory, or too much supply

## RESPONSE FORMAT
- Be direct. Buy, pass, or watch. No hedge words.
- Show the data: prices, listing counts, venue caps, Spotify numbers
- Use tables for tour data when showing multiple dates
- Always calculate listener-to-venue ratio for emerging artists
- Compare to reference cases when relevant (RAYE, Nessa Barrett, Naïka, Feid)
- End with a clear verdict and specific buy recommendations (which cities, why)

## VENUE SCALE RULES
- Under 3K cap = our sweet spot (scarcity-driven)
- 3K-10K = selective (only if demand signals are strong)  
- Over 10K = generally pass (too much supply) unless LATAM diaspora act

## REFERENCE CASES
- RAYE: 55M Spotify, UK→US breakout, SF $334 sold out. The template.
- Nessa Barrett: 14M TikTok, 150-cap venues, $134 floor. The "ratio formula."
- Naïka: Haitian-American R&B, Miami $356, diaspora demand explosion
- Feid: 36.6M Spotify at 1-2K Fillmores, $170-381. LATAM theater = money
- Angine de Poitrine: 643K Spotify, 28 sold-out shows, 350-600 cap. Hidden gem template.
- Don West: 3.2M Spotify, first US tour, 2 dates at 525 cap. UK breakout in progress.`;

// Tool definitions for Claude
const TOOLS = [
  {
    name: "vivid_seats_search",
    description: "Search for an artist on Vivid Seats and get real-time secondary market pricing for all their shows. Returns get-in price, listing count, ticket count, venue name, city, capacity, and date for each show.",
    input_schema: {
      type: "object",
      properties: {
        performer_id: {
          type: "number",
          description: "Vivid Seats performer ID. If unknown, use brave_search first to find it."
        }
      },
      required: ["performer_id"]
    }
  },
  {
    name: "brave_search",
    description: "Search the web using Brave Search. Use for finding Vivid Seats performer IDs, Spotify listener counts, sellout history, tour announcements, presale info, and general artist research.",
    input_schema: {
      type: "object",
      properties: {
        query: { type: "string", description: "Search query" }
      },
      required: ["query"]
    }
  },
  {
    name: "bandsintown_events",
    description: "Get upcoming tour dates for an artist from Bandsintown API. Returns venue, city, date, and capacity.",
    input_schema: {
      type: "object",
      properties: {
        artist_name: { type: "string", description: "Artist name (URL-safe)" }
      },
      required: ["artist_name"]
    }
  }
];

let messages = [];
let isLoading = false;

// Settings
function loadSettings() {
  return {
    apiKey: localStorage.getItem('bb_api_key') || '',
    model: localStorage.getItem('bb_model') || 'claude-sonnet-4-20250514',
    braveKey: localStorage.getItem('bb_brave_key') || ''
  };
}

function openSettings() {
  const s = loadSettings();
  document.getElementById('apiKey').value = s.apiKey;
  document.getElementById('modelSelect').value = s.model;
  document.getElementById('braveKey').value = s.braveKey;
  document.getElementById('settingsModal').classList.add('active');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('active');
}

function saveSettings() {
  localStorage.setItem('bb_api_key', document.getElementById('apiKey').value.trim());
  localStorage.setItem('bb_model', document.getElementById('modelSelect').value);
  localStorage.setItem('bb_brave_key', document.getElementById('braveKey').value.trim());
  closeSettings();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function sendExample(btn) {
  document.getElementById('userInput').value = btn.textContent;
  sendMessage();
}

function addMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = formatMessage(content);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function formatMessage(text) {
  // Basic markdown-ish formatting
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
    .replace(/🔴/g, '<span class="tier-red">🔴</span>')
    .replace(/🟡/g, '<span class="tier-yellow">🟡</span>')
    .replace(/⚪/g, '<span class="tier-green">⚪</span>');
}

function showLoading() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loadingIndicator';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loadingIndicator');
  if (el) el.remove();
}

// ============================================================
// TOOL EXECUTION
// ============================================================

async function executeVividSeats(performerId) {
  try {
    const resp = await fetch(
      `https://www.vividseats.com/hermes/api/v1/productions?performerId=${performerId}&limit=50`,
      { headers: { 'User-Agent': 'Mozilla/5.0' } }
    );
    const data = await resp.json();
    const items = (data.items || [])
      .filter(i => i.minPrice)
      .filter(i => {
        const cc = i.venue?.countryCode;
        return !cc || cc === 'US' || cc === 'CA';
      });
    return JSON.stringify(items.map(i => ({
      date: (i.localDate || '').split('T')[0],
      price: i.minPrice,
      listings: i.listingCount || 0,
      tickets: i.ticketCount || 0,
      venue: i.venue?.name || '?',
      city: i.venue?.city || '?',
      state: i.venue?.stateCode || i.venue?.countryCode || '?',
      capacity: i.venue?.capacity || null
    })));
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
}

async function executeBraveSearch(query) {
  const s = loadSettings();
  if (!s.braveKey) {
    return JSON.stringify({ error: "No Brave API key configured. Go to Settings to add one." });
  }
  try {
    const resp = await fetch(
      `https://api.search.brave.com/res/v1/web/search?q=${encodeURIComponent(query)}&count=5`,
      { headers: { 'X-Subscription-Token': s.braveKey, 'Accept': 'application/json' } }
    );
    const data = await resp.json();
    return JSON.stringify((data.web?.results || []).map(r => ({
      title: r.title,
      url: r.url,
      description: r.description
    })));
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
}

async function executeBandsintown(artistName) {
  try {
    const resp = await fetch(
      `https://rest.bandsintown.com/artists/${encodeURIComponent(artistName)}/events?app_id=squarespace-blackbeard`
    );
    const events = await resp.json();
    if (!Array.isArray(events)) return JSON.stringify({ error: "No events found" });
    return JSON.stringify(events.slice(0, 30).map(e => ({
      date: (e.datetime || '').split('T')[0],
      venue: e.venue?.name,
      city: e.venue?.city,
      region: e.venue?.region || e.venue?.country,
      capacity: e.venue?.capacity || null
    })));
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
}

async function executeTool(name, input) {
  switch (name) {
    case 'vivid_seats_search': return await executeVividSeats(input.performer_id);
    case 'brave_search': return await executeBraveSearch(input.query);
    case 'bandsintown_events': return await executeBandsintown(input.artist_name);
    default: return JSON.stringify({ error: 'Unknown tool' });
  }
}

// ============================================================
// CLAUDE API CALL
// ============================================================

async function callClaude(msgs) {
  const s = loadSettings();
  if (!s.apiKey) {
    openSettings();
    throw new Error('Please add your Anthropic API key in Settings.');
  }

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': s.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: s.model,
      max_tokens: 4096,
      system: SYSTEM_PROMPT,
      tools: TOOLS,
      messages: msgs
    })
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API error ${resp.status}: ${err}`);
  }
  return await resp.json();
}

// ============================================================
// MAIN SEND LOOP (handles tool use)
// ============================================================

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showLoading();

  try {
    let apiMessages = [...messages];
    let maxLoops = 10; // safety limit for tool-use loops

    while (maxLoops-- > 0) {
      const response = await callClaude(apiMessages);

      // Check if response has tool use
      const toolUseBlocks = (response.content || []).filter(b => b.type === 'tool_use');
      const textBlocks = (response.content || []).filter(b => b.type === 'text');

      if (toolUseBlocks.length > 0) {
        // Show thinking indicator
        hideLoading();
        const statusDiv = addMessage('assistant', `🔍 *Pulling data...*`);
        showLoading();

        // Add assistant response to messages
        apiMessages.push({ role: 'assistant', content: response.content });

        // Execute all tools
        const toolResults = [];
        for (const tool of toolUseBlocks) {
          const result = await executeTool(tool.name, tool.input);
          toolResults.push({
            type: 'tool_result',
            tool_use_id: tool.id,
            content: result
          });
        }

        // Remove status message
        statusDiv.remove();

        // Add tool results
        apiMessages.push({ role: 'user', content: toolResults });

      } else {
        // Final text response
        hideLoading();
        const fullText = textBlocks.map(b => b.text).join('\n');
        addMessage('assistant', fullText);
        messages.push({ role: 'assistant', content: fullText });
        break;
      }
    }
  } catch (e) {
    hideLoading();
    addMessage('assistant', `⚠️ Error: ${e.message}`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

// Auto-open settings if no API key
window.addEventListener('load', () => {
  const s = loadSettings();
  if (!s.apiKey) {
    setTimeout(openSettings, 500);
  }
});
</script>
</body>
</html>
