name = "blackbeard-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# Required secrets (set via: npx wrangler secret put <NAME>):
# ANTHROPIC_API_KEY  — Claude API key (required)
# BRAVE_API_KEY      — Brave Search API key (required)
# APP_SECRET         — Bearer token for auth (required)
#
# Optional secrets:
# TWITTER_BEARER     — X/Twitter API Bearer token
# SCRAPINGBEE_KEY    — ScrapingBee API key (for StubHub scraping)

[vars]
MODEL = "claude-sonnet-4-20250514"
